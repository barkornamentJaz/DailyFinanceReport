<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bark Ornament — Petty Cash</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#1d4ed8;--accent-hov:#1e40af;
  --success:#16a34a;--success-bg:rgba(22,163,74,0.09);
  --danger:#dc2626;--danger-bg:rgba(220,38,38,0.09);
  --warning:#d97706;--warning-bg:rgba(217,119,6,0.09);
  --border:#e2e8f0;--bg:#eef2f7;--card:#fff;--input:#f1f5f9;
  --text:#0f172a;--muted:#94a3b8;--secondary:#475569;
  --radius:14px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(15,23,42,0.10);
  --shadow-sm:0 1px 6px rgba(15,23,42,0.07);
  --sidebar:#0f2167;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-height:100vh;background:#1a2d6b;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;box-shadow:3px 0 16px rgba(0,0,0,0.18)}
.sb-logo{padding:18px 14px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.sb-logo-img{width:44px;height:44px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.78rem;color:#1a2d6b;flex-shrink:0}
.sb-company{font-weight:700;font-size:0.8rem;color:#fff;line-height:1.35}
.sb-addr{font-size:0.62rem;color:rgba(255,255,255,0.4);margin-top:2px;line-height:1.4}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-lbl{font-size:0.58rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:10px 16px 4px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,0.58);text-decoration:none;font-size:0.81rem;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all 0.13s;user-select:none}
.sb-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.sb-link.active{background:rgba(255,255,255,0.11);color:#fff;border-left-color:#f97316;font-weight:700}
.sb-link svg{width:15px;height:15px;flex-shrink:0;opacity:0.65}
.sb-link.active svg{opacity:1}
.sb-footer{padding:11px 16px;border-top:1px solid rgba(255,255,255,0.07);font-size:0.62rem;color:rgba(255,255,255,0.22);line-height:1.6}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
.topbar-left{display:flex;align-items:center;gap:10px}
.page-icon{font-size:1.25rem}
.page-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.05rem;color:var(--text)}
.page-sub{font-size:0.74rem;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.date-chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:0.74rem;font-weight:600;color:var(--secondary);white-space:nowrap}
.btn-topbar{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;background:var(--card);color:var(--secondary);transition:all 0.14s}
.btn-topbar:hover{background:var(--bg);color:var(--text)}
.btn-topbar.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-topbar.primary:hover{background:var(--accent-hov)}

/* ── CONTENT ── */
.content{padding:28px;flex:1}

/* ── SUMMARY CARDS ── */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow-sm)}
.sum-label{font-size:0.69rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sum-label .dot{width:7px;height:7px;border-radius:50%;background:#1d4ed8}
.sum-label .dot.green{background:#16a34a}
.sum-val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.55rem;color:var(--accent)}
.sum-val.loading{color:var(--muted);font-size:0.9rem;font-weight:400}
.sum-hint{font-size:0.71rem;color:var(--muted);margin-top:4px}

/* ── ENTRY PANEL ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:24px;overflow:hidden}
.panel-head{background:#0f2167;padding:15px 22px 13px}
.panel-head h2{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:0.93rem;color:#fff;display:flex;align-items:center;gap:8px}
.panel-head h2 .dot{width:7px;height:7px;border-radius:50%;background:#f97316;flex-shrink:0}
.panel-head p{font-size:0.71rem;color:rgba(255,255,255,0.45);margin-top:3px}
.panel-body{padding:20px 22px}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:0}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-group.full{grid-column:span 2}
.field-group label{font-size:0.69rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary)}
.field-group input[type="date"]{background:var(--input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;color:var(--text);font-size:0.88rem;font-family:'IBM Plex Sans',sans-serif;outline:none;width:100%;transition:border-color 0.15s,box-shadow 0.15s}
.field-group input[type="date"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,0.1);background:#fff}
.amount-wrap{position:relative}
.amount-wrap .prefix{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1rem;color:var(--muted);pointer-events:none}
.amount-input{background:var(--input);border:2px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px 11px 46px;color:var(--accent);font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.35rem;width:100%;outline:none;transition:border-color 0.15s,box-shadow 0.15s;text-align:right}
.amount-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,0.12);background:#fff}
.amount-input::placeholder{color:#cbd5e1;font-weight:600}
.field-group textarea{background:var(--input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;color:var(--text);font-size:0.85rem;font-family:'IBM Plex Sans',sans-serif;outline:none;resize:none;height:58px;width:100%;transition:border-color 0.15s,box-shadow 0.15s}
.field-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,0.1);background:#fff}
.field-group textarea::placeholder{color:var(--muted)}

.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:10px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;flex:1}
.btn-primary:hover{background:var(--accent-hov);transform:translateY(-1px);box-shadow:0 5px 16px rgba(29,78,216,0.28)}
.btn-secondary{background:#f1f5f9;color:var(--secondary);border:1px solid var(--border)}
.btn-secondary:hover{background:#e2e8f0;color:var(--text)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.status{display:none;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:0.82rem;font-weight:600;margin-top:12px}
.status.show{display:flex}
.status.ok{background:var(--success-bg);color:var(--success);border:1px solid rgba(22,163,74,0.2)}
.status.err{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(220,38,38,0.2)}
.status.warn{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(217,119,6,0.2)}

/* ── TABLE SECTION ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-hdr h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.93rem;color:var(--text);display:flex;align-items:center;gap:7px}
.table-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
thead th{background:#f1f5f9;padding:9px 14px;text-align:left;font-weight:700;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--secondary);border-bottom:2px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:hover{background:#f8faff}
tbody tr:last-child{border-bottom:none}
td{padding:9px 14px;vertical-align:middle}
td.muted{color:var(--muted);font-size:0.78rem}
td.amt{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--accent)}
td.note{color:var(--secondary);font-size:0.8rem;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;gap:5px}
.btn-icon{padding:5px 9px;font-size:0.77rem;border-radius:6px;border:1px solid transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:600;transition:all 0.13s}
.btn-edit{background:var(--warning-bg);color:var(--warning);border-color:rgba(217,119,6,0.18)}
.btn-edit:hover{background:var(--warning);color:#fff}
.btn-del{background:var(--danger-bg);color:var(--danger);border-color:rgba(220,38,38,0.18)}
.btn-del:hover{background:var(--danger);color:#fff}
tfoot td{background:#f8fafc;font-weight:700;padding:9px 14px;border-top:2px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;color:var(--accent)}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:0.85rem}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.4);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(15,23,42,0.16);width:100%;max-width:420px;animation:slideUp 0.18s ease}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 20px 12px;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.95rem;color:var(--text)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;line-height:1;padding:0 4px;border-radius:4px}
.modal-close:hover{color:var(--danger);background:var(--danger-bg)}
.modal-body{padding:18px 20px}
.modal-body .field-group{margin-bottom:14px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.confirm-box{padding:22px 20px;text-align:center}
.confirm-box p{font-size:0.88rem;color:var(--secondary);margin-bottom:16px}
.confirm-box .warn-icon{font-size:2rem;margin-bottom:8px}

/* ── SPINNER ── */
.spin{display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;animation:rot 0.6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{width:60px}
  
  .main{margin-left:220px; // 5 minutes

  // Wrap fetch to use cache
  window.__cache = {
    get: function(key) {
      try {
        const raw = sessionStorage.getItem('bork_cache_' + key);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (Date.now() - obj.ts > CACHE_TTL) { sessionStorage.removeItem('bork_cache_' + key); return null; }
        return obj.data;
      } catch(e) { return null; }
    },
    set: function(key, data) {
      try { sessionStorage.setItem('bork_cache_' + key, JSON.stringify({ts: Date.now(), data})); } catch(e) {}
    },
    clear: function() {
      try {
        Object.keys(sessionStorage).filter(k => k.startsWith('bork_cache_')).forEach(k => sessionStorage.removeItem(k));
      } catch(e) {}
    }
  };

  // Patch fetch to cache GET requests to the Apps Script
  const _origFetch = window.fetch;
  window.fetch = async function(url, opts) {
    const isGet = !opts || !opts.method || opts.method === 'GET';
    const isScript = typeof url === 'string' && url.includes('script.google.com');

    if (isGet && isScript) {
      const cacheKey = url.toString().replace(/.*\?/, '');
      const cached = window.__cache.get(cacheKey);

      if (cached) {
        // Return cached instantly
        const blob = new Blob([JSON.stringify(cached)], {type:'application/json'});
        const resp = new Response(blob, {status:200, headers:{'Content-Type':'application/json'}});

        // Silently refresh in background
        setTimeout(() => {
          _origFetch(url, opts).then(r => r.json()).then(fresh => {
            window.__cache.set(cacheKey, fresh);
          }).catch(() => {});
        }, 200);

        return resp;
      } else {
        // No cache — fetch normally and cache the result
        const resp = await _origFetch(url, opts);
        const clone = resp.clone();
        clone.json().then(data => window.__cache.set(cacheKey, data)).catch(() => {});
        return resp;
      }
    }

    // POST (save/delete) — clear cache so next load is fresh
    if (!isGet && isScript) {
      window.__cache.clear();
    }

    return _origFetch(url, opts);
  };
})();
</script>

</head>

<div class="main">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-icon">🪙</span>
      <div>
        <div class="page-title">Petty Cash</div>
        <div class="page-sub" id="todayLabel">—</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="date-chip" id="dateChip">—</div>
      <button class="btn-topbar" onclick="loadAll()">↻ Refresh</button>
      <button class="btn-topbar" onclick="window.print()">🖨 Print</button>
      <button class="btn-topbar primary" onclick="document.getElementById('f-close').focus()">+ Add Entry</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- SUMMARY CARDS -->
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-label"><span class="dot"></span> Petty Cash Balance</div>
        <div class="sum-val loading" id="totalBal">Loading…</div>
        <div class="sum-hint">Latest closing balance on record</div>
      </div>
      <div class="sum-card">
        <div class="sum-label"><span class="dot green"></span> Previous Closing Balance</div>
        <div class="sum-val loading" id="prevClose">Loading…</div>
        <div class="sum-hint">Second most recent entry</div>
      </div>
    </div>

    <!-- ENTRY PANEL -->
    <div class="panel">
      <div class="panel-head">
        <h2><span class="dot"></span> Update Petty Cash Closing Balance</h2>
        <p>Enter today's petty cash closing balance and save to Google Sheets</p>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="field-group">
            <label>Date</label>
            <input type="date" id="f-date">
          </div>
          <div class="field-group">
            <label>Closing Balance (LKR)</label>
            <div class="amount-wrap">
              <span class="prefix">Rs</span>
              <input type="number" class="amount-input" id="f-close" placeholder="0.00" step="0.01" min="0">
            </div>
          </div>
          <div class="field-group full">
            <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
            <textarea id="f-notes" placeholder="Any remarks…"></textarea>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="saveBtn" onclick="save()">💾 Save to Google Sheets</button>
        </div>
        <div class="status" id="statusBox"><span id="statusMsg"></span></div>
      </div>
    </div>

    <!-- PETTY CASH ENTRIES TABLE -->
    <div class="section-hdr">
      <h3>📋 Petty Cash Entries</h3>
    </div>

    <div class="table-panel">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Date</th>
              <th>Closing Balance</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tBody">
            <tr><td colspan="5"><div class="empty">Loading entries…</div></td></tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="2" style="text-align:right;color:var(--secondary);font-size:0.78rem;font-weight:600">Latest Closing Balance:</td>
              <td id="ft-latest">—</td>
              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>

<!-- EDIT MODAL -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-hdr">

      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="e-id">
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="e-date" style="background:var(--input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;font-size:0.88rem;font-family:'IBM Plex Sans',sans-serif;outline:none;width:100%;color:var(--text)">
      </div>
      <div class="field-group">
        <label>Closing Balance (LKR)</label>
        <div class="amount-wrap">
          <span class="prefix">Rs</span>
          <input type="number" class="amount-input" id="e-close" placeholder="0.00" step="0.01" style="font-size:1.15rem;padding:10px 13px 10px 46px">
        </div>
      </div>
      <div class="field-group" style="margin-bottom:0">
        <label>Notes</label>
        <textarea id="e-notes" placeholder="Any remarks…" style="background:var(--input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;font-size:0.85rem;font-family:'IBM Plex Sans',sans-serif;outline:none;resize:none;height:58px;width:100%"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="updateBtn" onclick="updateEntry()">💾 Update</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="overlay" id="delOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <h3>Delete Entry</h3>
      <button class="modal-close" onclick="closeDelModal()">×</button>
    </div>
    <div class="confirm-box">
      <div class="warn-icon">🗑️</div>
      <p>Are you sure you want to delete this entry?<br>This cannot be undone.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-secondary" onclick="closeDelModal()">Cancel</button>
        <button class="btn" style="background:var(--danger);color:#fff" id="confirmDelBtn" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4HSqqDmnhU5y49DDHaBzI7YbsXTFkUHZzKFRUBFmICh_fTPoFvyADgTboPgqcxTXr/exec';
const SHEET = 'PettyCash';

let allRows = [];
let deleteId = null;

// ── INIT ─────────────────────────────────────────────────
document.getElementById('yr2').textContent = new Date().getFullYear();
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

const now = new Date();
document.getElementById('todayLabel').textContent = now.toLocaleDateString('en-GB', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
document.getElementById('dateChip').textContent   = now.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });

loadAll();

// ── LOAD ALL ─────────────────────────────────────────────
async function loadAll() {
  try {
    const rows = await apiGet({ action:'getAll', sheet:SHEET });
    allRows = (rows || []).sort((a,b) => new Date(b.Date) - new Date(a.Date));
    renderTable();
    updateSummary();
  } catch(e) {
    document.getElementById('tBody').innerHTML = `<tr><td colspan="5"><div class="empty">Could not load entries.</div></td></tr>`;
    document.getElementById('totalBal').textContent = '—';
    document.getElementById('prevClose').textContent = '—';
    document.getElementById('totalBal').classList.remove('loading');
    document.getElementById('prevClose').classList.remove('loading');
  }
}

function updateSummary() {
  const t = document.getElementById('totalBal');
  const p = document.getElementById('prevClose');
  if (!allRows.length) {
    t.textContent = 'Rs 0.00'; t.classList.remove('loading');
    p.textContent = 'Rs 0.00'; p.classList.remove('loading');
    return;
  }
  t.textContent = fmtLKR(parseFloat(allRows[0].ClosingBalance) || 0);
  t.classList.remove('loading');
  p.textContent = allRows[1] ? fmtLKR(parseFloat(allRows[1].ClosingBalance) || 0) : '—';
  p.classList.remove('loading');
}

function renderTable() {
  const tb = document.getElementById('tBody');
  const ft = document.getElementById('ft-latest');
  if (!allRows.length) {
    tb.innerHTML = `<tr><td colspan="5"><div class="empty">No entries yet.</div></td></tr>`;
    ft.textContent = '—';
    return;
  }
  ft.textContent = fmtLKR(parseFloat(allRows[0].ClosingBalance) || 0);
  tb.innerHTML = allRows.map((r, i) => `
    <tr>
      <td class="muted">${i+1}</td>
      <td><strong>${fmtDate(r.Date)}</strong></td>
      <td class="amt">${fmtLKR(parseFloat(r.ClosingBalance)||0)}</td>
      <td class="note">${r.Notes || '—'}</td>
      <td><div class="actions">
        <button class="btn-icon btn-edit" onclick="openEdit('${r.ID}')">✏️ Edit</button>
        <button class="btn-icon btn-del" onclick="openDelete('${r.ID}')">🗑️</button>
      </div></td>
    </tr>`).join('');
}

// ── SAVE NEW ─────────────────────────────────────────────
async function save() {
  hideStatus();
  const date  = document.getElementById('f-date').value;
  const close = parseFloat(document.getElementById('f-close').value);
  const notes = document.getElementById('f-notes').value.trim();

  if (!date)        { showStatus('Please select a date.', 'warn'); return; }
  if (isNaN(close)) { showStatus('Please enter the closing balance.', 'warn'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';

  try {
    await apiPost({ action:'add', sheet:SHEET, data:{
      Date:''+date, ClosingBalance:close, Notes:notes
    }});
    showStatus('✅ Saved! Closing balance: ' + fmtLKR(close), 'ok');
    document.getElementById('f-close').value = '';
    document.getElementById('f-notes').value = '';
    await loadAll();
  } catch(e) {
    showStatus('❌ ' + e.message, 'err');
  }
  btn.disabled = false;
  btn.innerHTML = '💾 Save to Google Sheets';
}

// ── EDIT ─────────────────────────────────────────────────
function openEdit(id) {
  const r = allRows.find(x => x.ID === id);
  if (!r) return;
  document.getElementById('e-id').value    = id;
  document.getElementById('e-date').value  = fmtDateInput(r.Date);
  document.getElementById('e-close').value = parseFloat(r.ClosingBalance) || 0;
  document.getElementById('e-notes').value = r.Notes || '';
  document.getElementById('editOverlay').classList.add('open');
}

async function updateEntry() {
  const id    = document.getElementById('e-id').value;
  const date  = document.getElementById('e-date').value;
  const close = parseFloat(document.getElementById('e-close').value);
  const notes = document.getElementById('e-notes').value.trim();
  if (!date || isNaN(close)) return;

  const btn = document.getElementById('updateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';

  try {
    await apiPost({ action:'update', sheet:SHEET, id, data:{
      Date:''+date, ClosingBalance:close, Notes:notes
    }});
    closeModal();
    await loadAll();
  } catch(e) {
    alert('Error: ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '💾 Update';
}

function closeModal() { document.getElementById('editOverlay').classList.remove('open'); }

// ── DELETE ────────────────────────────────────────────────
function openDelete(id) {
  deleteId = id;
  document.getElementById('delOverlay').classList.add('open');
}

async function confirmDelete() {
  if (!deleteId) return;
  const btn = document.getElementById('confirmDelBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin" style="border-top-color:#fff"></span>';
  try {
    await apiPost({ action:'delete', sheet:SHEET, id:deleteId });
    closeDelModal();
    await loadAll();
  } catch(e) {
    alert('Error: ' + e.message);
    closeDelModal();
  }
  btn.disabled = false;
  btn.innerHTML = 'Delete';
}

function closeDelModal() { deleteId = null; document.getElementById('delOverlay').classList.remove('open'); }

// ── STATUS ────────────────────────────────────────────────
function showStatus(msg, type) {
  const s = document.getElementById('statusBox');
  s.className = 'status show ' + type;
  document.getElementById('statusMsg').textContent = msg;
}
function hideStatus() { document.getElementById('statusBox').className = 'status'; }

// ── API ───────────────────────────────────────────────────
async function apiGet(params) {
  const qs  = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  const res = await fetch(SCRIPT_URL+'?'+qs, {method:'GET',redirect:'follow',cache:'default'});
  if (!res.ok) throw new Error('HTTP '+res.status);
  const j = await res.json();
  if (!j.success) throw new Error(j.error||'Server error');
  return j.data;
}
async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {method:'POST',redirect:'follow',body:JSON.stringify(body)});
  if (!res.ok) throw new Error('HTTP '+res.status);
  const j = await res.json();
  if (!j.success) throw new Error(j.error||'Server error');
  return j.data;
}

// ── FORMAT ────────────────────────────────────────────────
function fmtLKR(n) {
  return 'Rs\u00A0'+parseFloat(n||0).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return isNaN(dt) ? String(d) : dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtDateInput(d) {
  if (!d) return '';
  const dt = new Date(d);
  return isNaN(dt) ? '' : dt.toISOString().split('T')[0];
}

window.addEventListener('load', loadAll);
</script>
</body>
</html>
