<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Closing Balance | Bark Ornament</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#1d4ed8;--accent-hov:#1e40af;
  --success:#16a34a;--success-bg:rgba(22,163,74,0.09);
  --danger:#dc2626;--danger-bg:rgba(220,38,38,0.09);
  --warning:#d97706;--warning-bg:rgba(217,119,6,0.09);
  --border:#e2e8f0;--bg:#eef2f7;--card:#fff;--input:#f1f5f9;
  --text:#0f172a;--muted:#94a3b8;--secondary:#475569;
  --radius:14px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(15,23,42,0.10);
  --shadow-sm:0 1px 6px rgba(15,23,42,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px 60px}

.top-bar{width:100%;max-width:420px;display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-box{width:44px;height:44px;background:#0f2167;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem}
.co-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.9rem;color:#0f2167}
.co-sub{font-size:0.72rem;color:var(--muted);margin-top:1px}
.date-chip{margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:0.74rem;font-weight:600;color:var(--secondary);white-space:nowrap;box-shadow:var(--shadow-sm)}

.card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-head{background:#0f2167;padding:20px 24px 18px}
.card-head h2{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.05rem;color:#fff;display:flex;align-items:center;gap:8px}
.card-head .dot{width:8px;height:8px;border-radius:50%;background:#f97316;flex-shrink:0}
.card-head p{font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:5px}

.prev-bar{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border-bottom:1px solid var(--border);padding:13px 24px}
.prev-bar .lbl{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted)}
.prev-bar .val{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1rem;color:var(--accent)}
.prev-bar .val.loading{color:var(--muted);font-size:0.83rem;font-weight:400}

.card-body{padding:24px}

.field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.field-group label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--secondary)}
.field-group input[type="date"]{background:var(--input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:0.9rem;font-family:'IBM Plex Sans',sans-serif;outline:none;width:100%;transition:border-color 0.15s,box-shadow 0.15s}
.field-group input[type="date"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,0.1);background:#fff}

.amount-wrap{position:relative}
.amount-wrap .prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1.1rem;color:var(--muted);pointer-events:none}
.amount-input{background:var(--input);border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px 14px 14px 52px;color:var(--accent);font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.6rem;width:100%;outline:none;transition:border-color 0.15s,box-shadow 0.15s;text-align:right}
.amount-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,0.12);background:#fff}
.amount-input::placeholder{color:#cbd5e1;font-weight:600}

.field-group textarea{background:var(--input);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:0.85rem;font-family:'IBM Plex Sans',sans-serif;outline:none;resize:none;height:64px;width:100%;transition:border-color 0.15s,box-shadow 0.15s}
.field-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,0.1);background:#fff}
.field-group textarea::placeholder{color:var(--muted)}

.btn-save{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-save:hover{background:var(--accent-hov);transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,78,216,0.3)}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}

.status{display:none;align-items:center;gap:8px;padding:11px 15px;border-radius:var(--radius-sm);font-size:0.84rem;font-weight:600;margin-top:13px}
.status.show{display:flex}
.status.ok{background:var(--success-bg);color:var(--success);border:1px solid rgba(22,163,74,0.2)}
.status.err{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(220,38,38,0.2)}
.status.warn{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(217,119,6,0.2)}

.spin{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;animation:rot 0.6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.footer{margin-top:16px;width:100%;max-width:420px;text-align:center;font-size:0.71rem;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-box">🌿</div>
  <div>
    <div class="co-name">Bark Ornament Pvt Ltd</div>
    <div class="co-sub">Daily Cash — Closing Balance</div>
  </div>
  <div class="date-chip" id="todayLabel">—</div>
</div>

<div class="card">
  <div class="card-head">
    <h2><span class="dot"></span> Update Closing Balance</h2>
    <p>Enter today's closing balance and save to Google Sheets</p>
  </div>

  <div class="prev-bar">
    <span class="lbl">Previous Closing Balance</span>
    <span class="val loading" id="prevClose">Loading…</span>
  </div>

  <div class="card-body">

    <div class="field-group">
      <label>Date</label>
      <input type="date" id="f-date">
    </div>

    <div class="field-group">
      <label>Closing Balance (LKR)</label>
      <div class="amount-wrap">
        <span class="prefix">Rs</span>
        <input type="number" class="amount-input" id="f-close" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>

    <div class="field-group">
      <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></label>
      <textarea id="f-notes" placeholder="Any remarks…"></textarea>
    </div>

    <button class="btn-save" id="saveBtn" onclick="save()">
      💾 Save to Google Sheets
    </button>

    <div class="status" id="statusBox">
      <span id="statusMsg"></span>
    </div>

  </div>
</div>

<div class="footer">
  <a href="index.html">← Back to Daily Report</a> &nbsp;·&nbsp; <span id="yr"></span>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4HSqqDmnhU5y49DDHaBzI7YbsXTFkUHZzKFRUBFmICh_fTPoFvyADgTboPgqcxTXr/exec';
const SHEET = 'CashDetails';

document.getElementById('yr').textContent = new Date().getFullYear();
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
document.getElementById('todayLabel').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });

loadPrev();

async function loadPrev() {
  try {
    const rows = await apiGet({ action:'getAll', sheet:SHEET });
    const el = document.getElementById('prevClose');
    if (!rows || !rows.length) { el.textContent = 'Rs 0.00'; el.classList.remove('loading'); return; }
    const last = rows.sort((a,b) => new Date(b.Date) - new Date(a.Date))[0];
    el.textContent = fmtLKR(parseFloat(last.ClosingBalance) || 0);
    el.classList.remove('loading');
  } catch(e) {
    document.getElementById('prevClose').textContent = '—';
    document.getElementById('prevClose').classList.remove('loading');
  }
}

async function save() {
  hideStatus();
  const date  = document.getElementById('f-date').value;
  const close = parseFloat(document.getElementById('f-close').value);
  const notes = document.getElementById('f-notes').value.trim();

  if (!date)        { showStatus('Please select a date.', 'warn'); return; }
  if (isNaN(close)) { showStatus('Please enter the closing balance.', 'warn'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';

  try {
    await apiPost({
      action : 'add',
      sheet  : SHEET,
      data   : {
        Date           : date,
        OpeningBalance : 0,
        CashIn         : 0,
        CashOut        : 0,
        ClosingBalance : close,
        Notes          : notes
      }
    });
    showStatus('✅ Saved! Closing balance: ' + fmtLKR(close), 'ok');
    document.getElementById('prevClose').textContent = fmtLKR(close);
    document.getElementById('f-close').value = '';
    document.getElementById('f-notes').value = '';
  } catch(e) {
    showStatus('❌ ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.innerHTML = '💾 Save to Google Sheets';
}

function showStatus(msg, type) {
  const s = document.getElementById('statusBox');
  s.className = 'status show ' + type;
  document.getElementById('statusMsg').textContent = msg;
}
function hideStatus() { document.getElementById('statusBox').className = 'status'; }

async function apiGet(params) {
  const qs  = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  const res = await fetch(SCRIPT_URL + '?' + qs, { method:'GET', redirect:'follow', cache:'no-cache' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const j = await res.json();
  if (!j.success) throw new Error(j.error || 'Server error');
  return j.data;
}
async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, { method:'POST', redirect:'follow', body: JSON.stringify(body) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const j = await res.json();
  if (!j.success) throw new Error(j.error || 'Server error');
  return j.data;
}

function fmtLKR(n) {
  return 'Rs\u00A0' + parseFloat(n||0).toLocaleString('en-LK', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
</script>
</body>
</html>
